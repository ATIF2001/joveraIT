<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Title -->
    <title>Jovera IT | Digital & Technology Solutions</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Jovera IT delivers innovative digital solutions, including web and mobile app development, IT consulting, cloud integration, and custom software for businesses in UAE and beyond."
    />
    <meta
      name="keywords"
      content="Jovera IT, digital solutions, software development, IT consulting, web development, mobile apps, cloud integration, UAE IT services"
    />
    <meta name="author" content="Jovera IT" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.joveraits.ae/" />

    <!-- Theme -->
    <meta name="theme-color" content="#0e0e0e" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="Jovera IT | Digital & Technology Solutions" />
    <meta
      property="og:description"
      content="Providing innovative IT and digital solutions including web, mobile, cloud, and custom software for businesses of all sizes."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.joveraits.ae/" />
    <meta property="og:image" content="%PUBLIC_URL%/logo.webp" />
    <meta property="og:site_name" content="Jovera IT" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jovera IT | Digital & Technology Solutions" />
    <meta
      name="twitter:description"
      content="Innovative IT solutions: web & mobile development, cloud integration, and software consulting for businesses in UAE."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo.webp" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/logo.webp" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.webp" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
