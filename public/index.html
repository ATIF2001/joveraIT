<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Title -->
    <title>Jovera Group | Real Estate, Finance & Business Solutions</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Jovera Group is a diversified business group offering real estate, financial services, IT, tourism, advertising, and corporate solutions with integrity and innovation."
    />
    <meta
      name="keywords"
      content="Jovera Group, real estate company, financial services, Information technology services, tourism, advertising, business solutions, UAE"
    />
    <meta name="author" content="Jovera Group" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.jovera.ae/" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="Jovera Group | Trusted Business Solutions" />
    <meta
      property="og:description"
      content="Professional services in real estate, finance, tourism, IT, and corporate consulting."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.jovera.ae/" />
    <meta property="og:image" content="%PUBLIC_URL%/logo2.png" />
    <meta property="og:site_name" content="Jovera Group" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jovera Group | Business Excellence" />
    <meta
      name="twitter:description"
      content="Delivering excellence in real estate, finance, tourism, and corporate services."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo2.png" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/logo2.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo2.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
